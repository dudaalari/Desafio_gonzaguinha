<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carros de Luxo - Bootstrap</title>
    
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            /* Fundo cinza para o resto do site */
            background-color: #4a4a4a; 
        }
        .navbar-brand {
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
        }
        /* Ajuste para as imagens do carrosel */
        .carousel-item img {
            object-fit: cover;
            border-radius: 10px;
            max-height: 500px; /* Mantém uma altura controlada */
        }
        .navbar {
            background-color: #000000 !important; /* Força o preto total na navbar */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="#">
                <i class="bi bi-car-front"></i> Gonzaguinha - Carros de Luxo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#"><strong>Introdução</strong></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><strong>Produtos</strong></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><strong>Contatos</strong></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 text-center">
        <h1 class="text-white mb-4">Carros de Luxo</h1>

        <div class="row justify-content-center">
            <div class="col-md-10">
                <div id="carouselCarros" class="carousel slide shadow-lg" data-bs-ride="carousel">
                    <div class="carousel-inner bg-dark p-4 rounded">
                        
                        <div class="carousel-item active text-white">
                            <h3>Mercedes-Benz AMG Vision GT</h3>
                            <p>Preço: R$ 1.735.900 | V8 biturbo 585 CV</p>
                            <img src="mercedes.jpg" class="d-block w-100" alt="Mercedes">
                        </div>

                        <div class="carousel-item text-white">
                            <h3>Devel Sixteen</h3>
                            <p>US$ 2,2 milhões | 5.007 cavalos | 560 km/h</p>
                            <img src="devel.jpg" class="d-block w-100" alt="Devel">
                        </div>

                        <div class="carousel-item text-white">
                            <h3>Koenigsegg Regera</h3>
                            <p>R$ 8 milhões | 5.0 L twin turbo V8 | 410 km/h</p>
                            <img src="koenigsegg.jpg" class="d-block w-100" alt="Koenigsegg">
                        </div>

                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselCarros" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselCarros" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-5 mb-5">
            <div class="col-md-6 bg-light p-4 rounded shadow">
                <h4 class="mb-3">Entre em Contato</h4>
                <form>
                    <div class="mb-3 text-start">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="seu@email.com">
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Mensagem de interesse</label>
                        <textarea class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Enviar Interesse</button>
                </form>
            </div>
        </div>
    </div>

    <script src="./js/bootstrap.bundle.min.js"></script>
</body>
</html>
